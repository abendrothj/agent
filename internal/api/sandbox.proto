syntax = "proto3";

package sandbox.v1;

option go_package = "github.com/ja/agent/internal/api/sandbox";

// ExecutionMetrics tracks performance during sandbox runs
message ExecutionMetrics {
  string request_id = 1;
  int64 duration_ms = 2;
  float accuracy_score = 3;  // 0.0-1.0, compared vs baseline
  int32 token_count = 4;
  float gpu_memory_peak_mb = 5;
  bool succeeded = 6;
  string error_msg = 7;
}

// PredictionRecord stores Shadow's baseline data
message PredictionRecord {
  string request_id = 1;
  string prompt = 2;
  string baseline_response = 3;
  repeated float baseline_embedding = 4;  // pgvector
  int64 recorded_at_ms = 5;
  bool eligible_for_canary = 6;  // set true if 24h + semantic match
}

// RunDryOpRequest executes Muscle in sandbox (no approval needed)
message RunDryOpRequest {
  string prompt = 1;
  string system_context = 2;
  int32 max_tokens = 3;
}

// RunDryOpResponse returns metrics + output
message RunDryOpResponse {
  string output = 1;
  ExecutionMetrics metrics = 2;
}

// RecordBaselineRequest stores prediction baseline (Shadow)
message RecordBaselineRequest {
  string request_id = 1;
  string prompt = 2;
  string response = 3;
  repeated float embedding = 4;
}

// RecordBaselineResponse confirms storage
message RecordBaselineResponse {
  string baseline_id = 1;
  bool success = 2;
}

// CheckCanaryEligibilityRequest evaluates promotion rules
message CheckCanaryEligibilityRequest {
  string request_id = 1;
  string prompt = 2;
  float semantic_similarity = 3;  // vs baseline embedding
}

// CheckCanaryEligibilityResponse decides if canary-ready
message CheckCanaryEligibilityResponse {
  bool eligible = 1;
  string reason = 2;
  int64 available_at_ms = 3;  // if not yet eligible
}

// Sandbox service enables dry-run execution and prediction validation
service Sandbox {
  // RunDryOp executes Muscle in isolation (unmetered, no approval)
  rpc RunDryOp(RunDryOpRequest) returns (RunDryOpResponse);
  
  // RecordBaseline stores Shadow's 24h baseline prediction
  rpc RecordBaseline(RecordBaselineRequest) returns (RecordBaselineResponse);
  
  // CheckCanaryEligibility evaluates Shadow promotion logic
  rpc CheckCanaryEligibility(CheckCanaryEligibilityRequest) returns (CheckCanaryEligibilityResponse);
}
